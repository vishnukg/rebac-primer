name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go build ./...
      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "These files need gofmt:"
            gofmt -l .
            exit 1
          fi
      - run: go vet ./...
      - run: go tool staticcheck ./... # pinned via the tool directive in go.mod
      - run: go test ./...
      - run: go test -race ./...

name: CI

on:
  push:
    branches: [main]
  pull_request:

# The Node project lives in typescript/ (the repo also has a Go implementation
# under go/, which this workflow does not cover).
defaults:
  run:
    working-directory: typescript

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run audit # make*/compose* naming convention

services:
  ts-tools:
    build:
      context: ../typescript
      dockerfile: Dockerfile
      target: deps
    working_dir: /workspace
    volumes:
      - ../typescript:/workspace
      - ts_node_modules:/workspace/node_modules
    environment:
      REBAC_API_URL: "http://ts-app:4000"
    profiles:
      - ts-tools

  ts-app:
    build:
      context: ../typescript
      dockerfile: Dockerfile
    environment:
      PORT: "4000"
    ports:
      - "4000:4000"
    profiles:
      - ts-app

  go-tools:
    build:
      context: ../go
      dockerfile: Dockerfile
      target: dev
    working_dir: /workspace
    volumes:
      - ../go:/workspace
      - go_cache:/root/go/pkg/mod
    profiles:
      - go-tools

  go-app:
    build:
      context: ../go
      dockerfile: Dockerfile
    environment:
      PORT: "4001"
    ports:
      - "4001:4001"
    profiles:
      - go-app

  openfga:
    image: openfga/openfga:latest
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: memory
      OPENFGA_LOG_FORMAT: json
    ports:
      - "8080:8080"
      - "8081:8081"
      - "3000:3000"

volumes:
  ts_node_modules:
  go_cache:

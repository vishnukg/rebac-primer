services:
  tools:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      target: deps
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - node_modules:/workspace/node_modules
    environment:
      REBAC_API_URL: "http://app:4000"
    profiles:
      - tools

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      PORT: "4000"
    ports:
      - "4000:4000"
    profiles:
      - app

  openfga:
    image: openfga/openfga:latest
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: memory
      OPENFGA_LOG_FORMAT: json
    ports:
      - "8080:8080"
      - "8081:8081"
      - "3000:3000"

volumes:
  node_modules:

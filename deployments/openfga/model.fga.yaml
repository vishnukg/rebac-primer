name: ReBAC Primer Model Contract
model_file: ./model.fga

tuples:
  # ── The demo story — identical to internal/fixtures/fixtures.go ──────────────
  # Alice reaches the document only as an inherited editor (team member → workspace
  # editor → document editor), never as an owner. Bob is a workspace viewer. Casey
  # has no path. Keep these four in lockstep with the Go fixtures so both backends
  # teach the same story.
  - user: user:alice
    relation: member
    object: team:platformTeam
  - user: team:platformTeam#member
    relation: editor
    object: workspace:productWorkspace
  - user: user:bob
    relation: viewer
    object: workspace:productWorkspace
  - user: workspace:productWorkspace
    relation: workspace
    object: document:roadmapDocument
  # ── Contract-only coverage ──────────────────────────────────────────────────
  # The demo story has no document owner, so on its own it never exercises the
  # `define can_delete: owner` path. Dana is a direct owner that exists ONLY in
  # this model test (not in fixtures.go) purely to validate the owner → can_delete
  # rule. Keeping it off Alice is deliberate: it leaves the demo cast consistent
  # across both backends.
  - user: user:dana
    relation: owner
    object: document:roadmapDocument

tests:
  - name: document permission matrix
    check:
      # Alice is an inherited editor, not an owner — so she cannot delete.
      # This now matches what the Go evaluator returns for the same fixtures.
      - user: user:alice
        object: document:roadmapDocument
        assertions:
          can_read: true
          can_comment: true
          can_edit: true
          can_delete: false
      # Dana is a direct owner (contract-only) — exercises the owner → can_delete path.
      - user: user:dana
        object: document:roadmapDocument
        assertions:
          can_read: true
          can_comment: true
          can_edit: true
          can_delete: true
      - user: user:bob
        object: document:roadmapDocument
        assertions:
          can_read: true
          can_comment: true
          can_edit: false
          can_delete: false
      - user: user:casey
        object: document:roadmapDocument
        assertions:
          can_read: false
          can_comment: false
          can_edit: false
          can_delete: false

  - name: team and workspace inheritance
    check:
      - user: user:alice
        object: team:platformTeam
        assertions:
          member: true
          admin: false
      - user: user:alice
        object: workspace:productWorkspace
        assertions:
          owner: false
          editor: true
          viewer: true
      - user: user:bob
        object: workspace:productWorkspace
        assertions:
          owner: false
          editor: false
          viewer: true
